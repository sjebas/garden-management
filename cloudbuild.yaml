options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: garden-manager
  _REGION: europe-west1
  _REPOSITORY: garden-management
  _IMAGE_NAME: garden-manager
  _FIRESTORE_COLLECTION_PREFIX: garden
  _RUNTIME_SERVICE_ACCOUNT: garden-flow-runner@garden-management-489611.iam.gserviceaccount.com
  _GEMINI_SECRET_NAME: gemini-api-key
  _GARDEN_MAP_BUCKET: "garden-management-489611-map"
  _MAX_INSTANCES: "4"
  _MIN_INSTANCES: "0"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --ingress
      - all
      - --allow-unauthenticated
      - --min-instances
      - ${_MIN_INSTANCES}
      - --max-instances
      - ${_MAX_INSTANCES}
      - --service-account
      - ${_RUNTIME_SERVICE_ACCOUNT}
      - --set-env-vars
      - GARDEN_DATA_BACKEND=firestore,FIRESTORE_PROJECT_ID=$PROJECT_ID,FIRESTORE_COLLECTION_PREFIX=${_FIRESTORE_COLLECTION_PREFIX},GARDEN_MAP_BUCKET=${_GARDEN_MAP_BUCKET}
      - --update-secrets
      - GEMINI_API_KEY=${_GEMINI_SECRET_NAME}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
