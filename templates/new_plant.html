{% extends "base.html" %}

{% block content %}
  <section class="section-heading">
    <div>
      <p class="eyebrow">Nieuwe plant</p>
      <h1>Voeg een nieuwe plant rustig toe.</h1>
      <p class="lede compact-lede">Bewaar hier de basisinformatie, zodat taken en adviezen later aan de juiste plant gekoppeld blijven.</p>
    </div>
    <a class="button-link" href="{{ url_for('plants') }}">Terug naar planten</a>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Plant bewaren</h2>
    </div>
    <form method="post" action="{{ url_for('create_plant') }}" class="editor-grid">
      <input name="Plant" placeholder="Naam van de plant" value="{{ new_plant.Plant }}" required>
      <input name="Type" placeholder="Soort of type" value="{{ new_plant.Type }}">
      <input name="Snoeigroep" placeholder="Snoeigroep" value="{{ new_plant.Snoeigroep }}">
      <input name="Standplaats" placeholder="Zon, halfschaduw, schaduw..." value="{{ new_plant.Standplaats }}">
      <input name="Winterhard" placeholder="Bijvoorbeeld ja of nee" value="{{ new_plant.Winterhard }}">
      <textarea name="Notitie" placeholder="Handige notitie over deze plant">{{ new_plant.Notitie }}</textarea>
      <button type="submit">Bewaar plant</button>
    </form>
  </section>
{% endblock %}
